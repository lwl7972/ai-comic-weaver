# ============================================================
# AI漫剧制作平台 - GitCode CI/CD 自动化流水线
# 平台: GitCode (兼容 GitLab CI)
# 触发: 推送到 main 分支 / 打 tag
#
# 【使用前必读】请先完成以下配置:
#   1. 在仓库 设置→CI/CD→Runners 中开启共享 Runner 或注册自有 Runner
#   2. 在 设置→CI/CD→变量 中添加 GITCODE_TOKEN (用于 Release API)
#   3. 确保 .gitlab-ci.yml 已推送到 main 分支
# ============================================================

# 全局变量
variables:
  PROJECT_NAME: "ai-comic-platform"
  VERSION: "0.1.0"
  NODE_VERSION: "20"
  JAVA_VERSION: "17"
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"
  npm_config_registry: "https://registry.npmmirror.com"

# 流水线阶段
stages:
  - build
  - package
  - release

# ============================================================
# Stage 1: 并行构建前端 + 后端
# ============================================================
build-frontend:
  stage: build
  image: node:20-slim
  only:
    - main
    - tags
  cache:
    key: v1-frontend-deps
    paths:
      - frontend/node_modules/
    policy: pull-push
  script:
    - cd frontend
    - npm ci
    - npm run build
    - echo "✅ Frontend build OK ($(ls dist/ | wc -l) files)"
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 2 hrs

build-backend:
  stage: build
  image: maven:3.9-eclipse-temurin-17
  only:
    - main
    - tags
  cache:
    key: v1-maven-repo
    paths:
      - .m2/repository/
    policy: pull-push
  script:
    - cd backend
    - mvn clean package -DskipTests -q
    - echo "✅ Backend JAR OK ($(ls target/*.jar | xargs basename))"
  artifacts:
    paths:
      - backend/target/*.jar
    expire_in: 2 hrs

# ============================================================
# Stage 2: 打包 Electron 桌面应用
# ============================================================
package-windows:
  stage: package
  image: electronuserland/builder:wine
  only:
    - main
  needs:
    - job: build-frontend
      artifacts: true
    - job: build-backend
      artifacts: true
  before_script:
    - apt-get update && apt-get install -y curl jq
    - curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
    - apt-get install -y nodejs
    - npm install -g electron-builder@latest
  script:
    # 确保构建产物在正确位置
    - mkdir -p backend/target frontend/dist
    # 前端重新构建（确保路径正确）
    - cd frontend && npm ci && npm run build && cd ..
    # Electron 打包 Windows 版本
    - npx electron-builder --win --publish never
        --config.productName="AI漫剧"
        --config.appId="com.aicomic.platform"
        --config.directories.output=release/win
        --config.win.target="nsis"
        --config.win.icon="assets/logo.png"
        --config.nsis.oneClick=false
        --config.nsis.allowToChangeInstallationDirectory=true
    # 列出产物
    - echo "=== 📦 Build Artifacts ===" && ls -lh release/win/ 2>/dev/null || echo "No output in release/win/"
  artifacts:
    paths:
      - release/win/
    expire_in: 7 days
  tags: [docker]

# ============================================================
# Stage 3: 创建 Release (可选)
# ============================================================
create-release:
  stage: release
  image: alpine:latest
  only:
    - main
  needs:
    - job: package-windows
      artifacts: true
  before_script:
    - apk add --no-cache curl jq
  script:
    # 生成版本号
    - BUILD_DATE=$(date +%Y%m%d)
    - SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-8)
    - RELEASE_TAG="v${VERSION}-${BUILD_DATE}-${SHORT_SHA}"
    # 收集发布文件
    - mkdir -p release-artifacts
    - cp release/win/*.exe release-artifacts/ 2>/dev/null || true
    - cp release/win/*.yml release-artifacts/ 2>/dev/null || true
    - echo "📌 Version: ${RELEASE_TAG}"
    - ls -lh release-artifacts/ 2>/dev/null || echo "(无发布文件)"
    # 通过 API 创建 Release (GitCode 兼容)
    - |
      if [ -n "$GITCODE_TOKEN" ]; then
        echo "Creating release via API..."
        curl -sS -X POST "${CI_SERVER_URL}/api/v4/projects/${CI_PROJECT_ID}/releases"
          --header "PRIVATE-TOKEN: ${GITCODE_TOKEN}"
          --header "Content-Type: application/json"
          -d "{
            \"name\": \"AI漫剧 ${RELEASE_TAG}\",
            \"tag_name\": \"${RELEASE_TAG}\",
            \"description\": \"## AI漫剧制作平台 ${RELEASE_TAG}\\n\\n### 📦 下载\\n- Windows: \\`.exe\\` 安装包\\n\\n---\\n*自动构建于 $(date)*\"
          }" && echo "✅ Release created" || echo "⚠️ Release API failed"
      else
        echo "ℹ️ GITCODE_TOKEN 未设置，跳过 Release 创建"
        echo "请在 设置→CI/CD→变量 中添加 GITCODE_TOKEN"
      fi
  environment:
    name: production
    url: "${CI_PROJECT_URL}/-/releases"
  artifacts:
    paths:
      - release-artifacts/
    expire_in: 30 days
  when: manual  # 手动触发，避免每次 push 都创建 release
