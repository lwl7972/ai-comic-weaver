server:
  port: 8080

spring:
  application:
    name: ai-comic-platform

  datasource:
    url: jdbc:sqlite:data/aicomic.db
    driver-class-name: org.sqlite.JDBC

  jpa:
    database-platform: com.aicomic.common.config.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  task:
    execution:
      pool:
        core-size: 4
        max-size: 8
        queue-capacity: 50
      thread-name-prefix: async-task-

# File storage paths
app:
  storage:
    base-dir: ./data
    path: ./data
    temp-dir: ./data/temp
    generated-dir: ./data/generated
    output-dir: ./data/output
    backup-dir: ./data/backups
    uploads-dir: ./data/uploads
  # Random port for Electron spawn mode (overridden at runtime by main process)
  random-port: ${RANDOM_PORT:8080}

# CORS configuration - 生产环境请替换为具体域名
# 当前允许所有来源，适合本地开发；部署时建议改为:
#   allowed-origins: https://your-domain.com
cors:
  allowed-origins: "*"

logging:
  level:
    com.aicomic: DEBUG
    org.hibernate.SQL: WARN
  file:
    name: logs/aicomic.log

# SpringDoc OpenAPI Configuration
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
    enabled: true
  show-actuator: false
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
