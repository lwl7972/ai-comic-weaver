# ============================================================
# GitHub Actions 自动化流水线 (备用方案)
# 如果在 GitHub 上使用，将此文件放到 .github/workflows/ 目录
# 触发: push to main / 手动触发
# 功能: 构建 → 打包 Electron → 发布 Release
# ============================================================

name: AI漫剧 - 自动打包发布

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: '自定义版本号 (留空自动生成)'
        required: false
        default: ''

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'
  PROJECT_NAME: ai-comic-platform

jobs:
  # ================================================================
  # Job 1: 构建前端 + 后端
  # ================================================================
  build:
    name: 🏗️ 构建前后端
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
          settings-path: ${{ github.workspace }}/backend/.m2

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci --registry=https://registry.npmmirror.com

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Build Backend JAR
        working-directory: backend
        run: mvn clean package -DskipTests -B

      - name: Upload Frontend Dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Upload Backend JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar

  # ================================================================
  # Job 2: 打包 Windows 版本
  # ================================================================
  package-windows:
    name: 📦 打包 Windows
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download Frontend Dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Download Backend JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/target

      - name: Install Deps & Build
        run: |
          cd frontend && npm ci --registry=https://registry.npmmirror.com && npm run build && cd ..
          npm install -g electron-builder@latest

      - name: Package Electron (Windows x64)
        run: |
          npx electron-builder --win --publish never \
            -c.productName="AI漫剧" \
            -c.appId="com.aicomic.platform" \
            -c.directories.output=release/win \
            -c.win.target=target=nsis \
            -c.win.icon=assets/logo.png \
            -c.nsis.oneClick=false \
            -c.nsis.allowToChangeInstallationDirectory=true \
            -c.nsis.installerIcon=assets/logo.png \
            -c.nsis.createDesktopShortcut=true \
            -c.publish.provider=generic \
            -c.publish.url=https://github.com/${{ github.repository }}/releases/latest

      - name: List Build Outputs
        run: find release/win/ -type f | head -20

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/win/*.exe

      - name: Upload Windows Blockmap (for auto-update)
        uses: actions/upload-artifact@v4
        with:
          name: windows-blockmap
          path: release/win/*.yml
          path: release/win/*.blockmap

  # ================================================================
  # Job 3: 打包 macOS 版本
  # ================================================================
  package-macos:
    name: 🍎 打包 macOS
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download Frontend Dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Download Backend JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/target

      - name: Install & Build
        run: |
          cd frontend && npm ci --registry=https://registry.npmmirror.com && npm run build && cd ..
          npm install -g electron-builder@latest

      - name: Package Electron (macOS Universal)
        run: |
          npx electron-builder --mac --publish never \
            -c.productName="AI漫剧" \
            -c.appId="com.aicomic.platform" \
            -c.directories.output=release/mac \
            -c.mac.target=target=dmg \
            -c.mac.icon=assets/logo.png \
            -c.mac.category=public.app-category.entertainment \
            -c.publish.provider=generic

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: release/mac/*.dmg

  # ================================================================
  # Job 4: 创建 GitHub Release
  # ================================================================
  release:
    name: 🚀 发布 Release
    needs: [package-windows, package-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          pattern: '*'
          merge-multiple: false

      - name: Prepare Release Assets
        run: |
          mkdir -p release-assets
          
          # Windows installer
          cp all-artifacts/windows-installer/*.exe release-assets/ 2>/dev/null || true
          cp all-artifacts/windows-blockmap/*.yml release-assets/ 2>/dev/null || true
          cp all-artifacts/windows-blockmap/*.blockmap release-assets/ 2>/dev/null || true
          
          # macOS DMG  
          cp all-artifacts/macos-dmg/*.dmg release-assets/ 2>/dev/null || true
          
          echo "=== Release assets ==="
          ls -lh release-assets/

      - name: Generate Version Tag
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref }}"
          else
            DATE=$(date +%Y%m%d)
            SHA="${GITHUB_SHA:0:8}"
            VERSION="v0.1.0-${DATE}-${SHA}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "📌 Version: ${VERSION}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "AI漫剧 ${{ steps.version.outputs.version }}"
          body: |
            ## AI漫剧制作平台 ${{ steps.version.outputs.version }}

            ### ✨ 新功能
            - 🎬 六大模块流水线完整骨架（剧本→角色→场景→分镜→导演→S级）
            - 🔧 28 张数据表 Entity + Repository 层
            - 💻 Electron 桌面端（内嵌 JVM）
            - 🎨 Vue 3 + Element Plus 前端界面
            - 🔄 CI/CD 自动化打包发布

            ### 📥 下载安装包
            请根据您的操作系统下载对应的安装包：
            
            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Windows | `*.exe` | NSIS 安装程序，支持自定义安装路径 |
            | macOS | `*.dmg` | Apple Silicon + Intel 通用版 |

            > **注意**：首次启动需要等待 JVM 初始化（约 5-10 秒）

            ---
            *由 [GitCode CI](https://gitcode.com/aicomic/aicomatic) 自动构建发布*
          draft: false
          prerelease: false
          files: release-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
