# 自动发布工作流
# 当推送版本 tag 时，自动构建并发布到 GitHub Releases

name: Release

on:
  push:
    tags:
      - 'v*'  # 匹配 v1.0.0, v0.1.0 等版本标签

jobs:
  release:
    runs-on: windows-latest  # Electron 打包需要 Windows 环境

    permissions:
      contents: write  # 允许创建 Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ============================================================
      # 环境准备 - Java
      # ============================================================
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          java-package: jdk
          check-latest: true

      # ============================================================
      # 环境准备 - Node.js
      # ============================================================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          check-latest: true

      # ============================================================
      # 诊断信息
      # ============================================================
      - name: Verify Environment
        run: |
          Write-Host "=== Java 版本 ==="
          java -version
          Write-Host "=== Maven 版本 ==="
          mvn --version
          Write-Host "=== Node.js 版本 ==="
          node --version
          Write-Host "=== npm 版本 ==="
          npm --version
          Write-Host "=== 当前目录 ==="
          Get-Location
          Write-Host "=== 目录结构 ==="
          Get-ChildItem | Select-Object Name
        shell: pwsh

      # ============================================================
      # 构建后端
      # ============================================================
      - name: Build Backend
        run: |
          Write-Host "=== 开始构建后端 ==="
          cd backend
          Write-Host "=== 后端目录 ==="
          Get-Location
          Write-Host "=== pom.xml 内容（前 30 行）==="
          Get-Content pom.xml -Head 30
          
          Write-Host "=== 执行 Maven 构建 ==="
          mvn clean package -DskipTests -B -e -V
          
          Write-Host "=== 构建完成，检查 jar 文件 ==="
          Get-ChildItem -Path target\*.jar | ForEach-Object { Write-Host $_.Name }
          
          # 重命名为固定名称（Electron 期望此名称）
          Write-Host "=== 重命名 jar 文件 ==="
          $jar = Get-ChildItem -Path target\ai-comic-platform-*.jar | Select-Object -First 1
          if (-not $jar) { throw "No backend jar found" }
          Write-Host "Found jar: $($jar.Name)"
          Copy-Item -Path $jar.FullName -Destination "target\ai-comic-platform.jar" -Force
          Get-ChildItem -Path target\*.jar
        shell: pwsh

      # ============================================================
      # 构建前端
      # ============================================================
      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      # ============================================================
      # 打包 Electron
      # ============================================================
      - name: Install Dependencies
        run: npm ci

      - name: Package Electron
        run: npx electron-builder --win --publish never

      # ============================================================
      # 发布 GitHub Releases
      # ============================================================
      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: "AI 漫剧 ${{ github.ref_name }}"
          body: |
            ## AI 漫剧制作平台 ${{ github.ref_name }}

            ### 功能特性
            - Vue3 + Element Plus 前端界面
            - Spring Boot 后端 + SQLite
            - Electron 桌面端 (NSIS 安装包)
            - 🆕 内置自动更新检测

            ### 下载安装
            下载 `AI 漫剧_Setup_${{ github.ref_name }}.exe` 安装即可。

            ### 自动更新
            已安装用户可在"配置中心" → "软件更新"中检测并自动下载安装。

            ### 注意事项
            - 首次启动需等待 5-10 秒初始化 JVM 后端
            - 需要 JDK 17 运行环境（已内嵌）

            [查看完整更新日志](https://github.com/lwl7972/ai-comic-weaver/compare/${{ github.ref_name }}...${{ github.ref_name }})

          files: |
            release/*.exe
            release/latest.yml
            release/*.blockmap
          draft: false
          prerelease: false
          generate_release_notes: true

      # ============================================================
      # 上传构建产物
      # ============================================================
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: |
            release/*.exe
            release/latest.yml
            release/*.blockmap
          retention-days: 30
