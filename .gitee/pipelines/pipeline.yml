# ============================================================
# AI漫剧制作平台 - Gitee Go 自动化流水线
# 触发: 推送到 main 分支
#
# 【使用前必读】
#   1. 在 Gitee 仓库 → 服务 → Gitee Go → 开启流水线
#   2. 在 变量管理 中添加:
#      - ACCESS_TOKEN: 292a18e3bdd03e83f231d5e6129fcc5
# ============================================================

name: ai-comic-weaver-ci

displayName: 'AI漫剧 - 自动构建打包'

triggers:
  push:
    branches:
      include:
        - main

variables:
  PROJECT_NAME: "ai-comic-weaver"
  VERSION: "0.1.0"
  NODE_VERSION: "20"
  JAVA_VERSION: "17"

stages:
  - name: build-frontend
    displayName: '构建前端'
    strategy: naturally
    trigger: auto
    steps:
      - step: build@1
        name: build_frontend
        displayName: 'Vue3 + Vite 构建'
        nodeVersion: ${NODE_VERSION}
        commands:
          # 使用淘宝镜像加速
          - npm config set registry https://registry.npmmirror.com
          - cd frontend && npm ci && npm run build
          - echo "✅ 前端构建完成"
        artifacts:
          - name: frontend-dist
            path:
              - frontend/dist/
  - name: build-backend
    displayName: '构建后端'
    strategy: naturally
    trigger: auto
    steps:
      - step: build@1
        name: build_backend
        displayName: 'Spring Boot Maven 构建'
        jdkVersion: ${JAVA_VERSION}
        mavenVersion: 3.9
        commands:
          - cd backend && mvn clean package -DskipTests -q
          - echo "✅ 后端JAR构建完成"
        artifacts:
          - name: backend-jar
            path:
              - backend/target/*.jar
  - name: package-electron
    displayName: '打包 Electron'
    strategy: naturally
    trigger: auto
    steps:
      - step: build@1
        name: package_win
        displayName: '打包 Windows 安装包'
        nodeVersion: ${NODE_VERSION}
        commands:
          # 设置 Electron 镜像（国内加速）
          - export ELECTRON_MIRROR=https://npmmirror.com/mirrors/electron/
          - npm install -g electron-builder@latest
          # 前端重新构建
          - export npm_config_registry=https://registry.npmmirror.com
          - cd frontend && npm ci && npm run build && cd ..
          # 打包 Windows 版本
          - npx electron-builder --win --publish never
              --config.productName="AI漫剧"
              --config.appId="com.aicomic.platform"
              --config.directories.output="release/win"
              --config.win.target="nsis"
              --config.win.icon="assets/logo.png"
              --config.nsis.oneClick=false
              --config.nsis.allowToChangeInstallationDirectory=true
              --config.nsis.createDesktopShortcut=true
          - echo "📦 Windows 打包完成"
          - ls -lh release/win/ || echo "无输出"
        artifacts:
          - name: windows-installer
            path:
              - release/win/*.exe
              - release/win/*.yml
              - release/win/*.blockmap

# ============================================================
# 发布阶段 (手动触发)
# ============================================================
  - name: release
    displayName: '发布 Release'
    strategy: naturally
    trigger: manual  # 手动触发，避免每次push都发版
    steps:
      - step: publish@1
        name: publish_release
        displayName: '创建版本发布'
        version: '${VERSION}'
        allowEmptyChanges: false  # 无变更不发版
        artifacts:
          - name: win-exe
            path:
              - release/win/*.exe
          - name: win-update
            path:
              - release/win/*.yml
              - release/win/*.blockmap
