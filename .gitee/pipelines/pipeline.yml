version: '1.0'
name: ai-comic-weaver-ci
displayName: main-pipline
triggers:
  trigger: auto
  push:
    branches:
      include:
        - main
variables:
  PROJECT_NAME: ai-comic-weaver
  # VERSION 动态从 package.json 获取，不再硬编码
stages:

  # ============================================================
  # Stage 1: 构建前端
  # ============================================================
  - name: build-frontend
    displayName: 构建前端
    strategy: naturally
    trigger: auto
    executor:
      - sf110
    steps:
      - step: build@nodejs
        name: build_nodejs
        displayName: Nodejs 构建
        nodeVersion: 20.10.0
        commands:
          - npm config set registry https://registry.npmmirror.com
          - echo ">>> [frontend] 开始构建..."
          - cd frontend && npm install --legacy-peer-deps && npm run build
          - echo ">>> [frontend] ✅ 构建完成"
          - ls -la dist/
        artifacts:
          - name: frontend-dist
            path:
              - ./frontend/dist/
        caches:
          - ~/.npm
        notify: []
        strategy:
          retry: '0'

  # ============================================================
  # Stage 2: 构建后端
  # ============================================================
  - name: build-backend
    displayName: 构建后端
    strategy: naturally
    trigger: auto
    executor:
      - sf110
    steps:
      - step: build@maven
        name: build_maven
        displayName: Maven 构建
        jdkVersion: '17'
        mavenVersion: 3.9.11
        commands:
          - echo ">>> [backend] 开始构建..."
          - cd backend && mvn clean package -Dmaven.test.skip=true -B
          - echo ">>> [backend] ✅ 构建完成"
          - ls -la target/*.jar
        artifacts:
          - name: backend-jar
            path:
              - ./backend/target/*.jar
        caches:
          - ~/.m2
        notify: []
        strategy:
          retry: '0'

  # ============================================================
  # Stage 3: 打包 Electron Windows
  # ============================================================
  - name: package-electron
    displayName: 打包 Electron
    strategy: naturally
    trigger: auto
    # ★ 依赖前两个 stage 完成，artifacts 会自动传入
    dependOn:
      - name: build-frontend
      - name: build-backend
    steps:
      # ★★★ build@nodejs 插件行为 ★★★
      #   1. 保留第1条用户命令
      #   2. 自动注入: export ELECTRON_MIRROR, ELECTRON_BUILDER_BINARIES_MIRROR
      #   3. 自动注入: npm install -g electron-builder@latest
      #   4. 保留后续用户命令（仅限构建相关）
      #   5. 从第一个 cd .. 开始，丢弃所有后续命令，替换为 npx electron-builder
      #
      #   ★ 对策：不写任何 cd ..，不写打包命令，让插件自动处理
      - step: build@nodejs
        name: build_electron
        displayName: Electron 打包
        nodeVersion: 20.10.0
        commands:
          - npm config set registry https://registry.npmmirror.com
          - '# ====== [0] 修补 @noble/hashes ======'
          - bash scripts/fix-noble.sh
          - '# ====== [1] 验证 artifacts 是否存在 ======'
          - echo ">>> [electron] 检查前置产物..."
          - test -d frontend/dist && echo "✅ frontend/dist 存在" || { echo "❌ frontend/dist 不存在!"; exit 1; }
          - ls backend/target/*.jar 2>/dev/null && echo "✅ backend jar 存在" || { echo "❌ backend jar 不存在!"; exit 1; }
          - '# ====== [2] 安装项目依赖 ======'
          - npm install --legacy-peer-deps
          - echo ">>> [electron] 准备完成，等待插件执行 electron-builder..."
        artifacts:
          - name: win-exe
            path:
              - ./*.exe
              - ./release/**/*.exe
          - name: win-update
            path:
              - ./*.yml
              - ./*.blockmap
              - ./release/**/*.yml
              - ./release/**/*.blockmap
        caches:
          - ~/.npm
        notify: []
        strategy:
          retry: '1'

  # ============================================================
  # Stage 4: 发布 Release (手动触发)
  # ============================================================
  - name: release
    displayName: 发布 Release
    strategy: naturally
    trigger: manual
    steps:
      - step: release@gitee
        name: release_gitee
        displayName: Gitee Release
        releaseName: AI漫剧 ${VERSION}
        description: |
          ## AI漫剧制作平台 v${VERSION}

          ### ✨ 功能
          - 六大模块流水线完整骨架
          - Vue3 + Element Plus 前端界面
          - Spring Boot 后端 + SQLite
          - Electron 桌面端

          ### 📥 下载安装包

          | 平台 | 文件 |
          |------|------|
          | Windows | AI漫剧_Setup_${VERSION}.exe |

          > 首次启动需要等待 JVM 初始化（约 5-10 秒）

          ---
          *由 Gitee Go 自动构建发布*
        tagName: v${VERSION}
        upstreamArtifact:
          - win-exe
        assertFiles: null
        prerelease: false
        allowUpdate: true
        notify: []
        strategy:
          retry: '0'
strategy:
  blocking: true
