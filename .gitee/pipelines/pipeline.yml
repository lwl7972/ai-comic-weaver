version: '1.0'
name: ai-comic-weaver-ci
displayName: main-pipline
triggers:
  trigger: auto
  push:
    branches:
      include:
        - main
variables:
  PROJECT_NAME: ai-comic-weaver
  VERSION: '0.1.0'
  # ⚠️ ACCESS_TOKEN 已在变量管理中配置，不要写在YAML里（安全风险）
stages:

  # ============================================================
  # Stage 1: 构建前端
  # ============================================================
  - name: build-frontend
    displayName: 构建前端
    strategy: naturally
    trigger: auto
    executor:
      - sf110
    steps:
      - step: build@nodejs
        name: build_nodejs
        displayName: Nodejs 构建
        nodeVersion: 20.10.0
        commands:
          - '# 设置NPM源'
          - npm config set registry https://registry.npmmirror.com
          - ''
          - '# ★ 关键修复：进入 frontend 子目录构建 (用 npm install 替代 npm ci，因为无 lock 文件)'
          - cd frontend && npm install --legacy-peer-deps && npm run build
          - echo "✅ 前端构建完成"
        artifacts:
          - name: frontend-dist
            path:
              - ./frontend/dist/
        caches:
          - ~/.npm
        notify: []
        strategy:
          retry: '0'

  # ============================================================
  # Stage 2: 构建后端
  # ============================================================
  - name: build-backend
    displayName: 构建后端
    strategy: naturally
    trigger: auto
    executor:
      - sf110
    steps:
      - step: build@maven
        name: build_maven
        displayName: Maven 构建
        jdkVersion: '17'
        mavenVersion: 3.9.11
        commands:
          - '# ★ 关键修复：进入 backend 子目录构建'
          - cd backend && mvn clean package -Dmaven.test.skip=true -B
          - echo "✅ 后端构建完成"
        artifacts:
          - name: backend-jar
            path:
              - ./backend/target/*.jar
        caches:
          - ~/.m2
        notify: []
        strategy:
          retry: '0'

  # ============================================================
  # Stage 3: 打包 Electron Windows
  # ============================================================
  - name: package-electron
    displayName: 打包 Electron
    strategy: naturally
    trigger: auto
    steps:
      # ★★★ build@nodejs 插件行为分析 ★★★
      #   1. 自动注入: export ELECTRON_MIRROR, ELECTRON_BUILDER_BINARIES_MIRROR
      #   2. 自动注入: npm install -g electron-builder@latest（含 @noble/hashes@2.x ESM）
      #   3. 保留中间的用户命令
      #   4. 替换最后一条命令为: npx electron-builder --win ...（从 electron-builder.json 读配置）
      #
      #   对策: 在倒数第二行运行 fix-noble.sh 修补全局 @noble，让插件 auto-generated 的
      #         npx electron-builder 拿到已修复的 CJS 版本
      - step: build@nodejs
        name: build_electron
        displayName: Electron 打包
        nodeVersion: 20.10.0
        commands:
          - npm config set registry https://registry.npmmirror.com
          - '# ====== [1] 构建前端 ======'
          - mkdir -p frontend/dist backend/target release/win && cd frontend && npm install --legacy-peer-deps && npm run build
          - '# ====== [2] 修复 @noble/hashes（在插件接管打包之前执行） ======'
          - cd .. && bash scripts/fix-noble.sh
          - '# ====== [3] 打包（插件会将此行替换为 npx electron-builder） ======'
          - echo "placeholder for auto-packaging"
        artifacts:
          - name: win-exe
            path:
              - ./release/win/*.exe
          - name: win-update
            path:
              - ./release/win/*.yml
              - ./release/win/*.blockmap
        caches:
          - ~/.npm
        notify: []
        strategy:
          retry: '1'   # Electron 下载可能失败，重试一次

  # ============================================================
  # Stage 4: 发布 Release (手动触发)
  # ============================================================
  - name: release
    displayName: 发布 Release
    strategy: naturally
    trigger: manual
    steps:
      - step: release@gitee
        name: release_gitee
        displayName: Gitee Release
        releaseName: AI漫剧 ${VERSION}
        description: |
          ## AI漫剧制作平台 v${VERSION}

          ### ✨ 功能
          - 六大模块流水线完整骨架
          - Vue3 + Element Plus 前端界面
          - Spring Boot 后端 + SQLite
          - Electron 桌面端

          ### 📥 下载安装包

          | 平台 | 文件 |
          |------|------|
          | Windows | AI漫剧-Setup-x64.exe |

          > 首次启动需要等待 JVM 初始化（约 5-10 秒）

          ---
          *由 Gitee Go 自动构建发布*
        tagName: v${VERSION}
        upstreamArtifact:
          - win-exe       # ★ 修改：引用 Electron 的产物
        assertFiles: null
        prerelease: false
        allowUpdate: true
        notify: []
        strategy:
          retry: '0'
strategy:
  blocking: true
