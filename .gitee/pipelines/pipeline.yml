version: '1.0'
name: ai-comic-weaver-ci
displayName: main-pipline
triggers:
  trigger: auto
  push:
    branches:
      include:
        - main
variables:
  PROJECT_NAME: ai-comic-weaver
  VERSION: '0.1.0'
  # ⚠️ ACCESS_TOKEN 已在变量管理中配置，不要写在YAML里（安全风险）
stages:

  # ============================================================
  # Stage 1: 构建前端
  # ============================================================
  - name: build-frontend
    displayName: 构建前端
    strategy: naturally
    trigger: auto
    executor:
      - sf110
    steps:
      - step: build@nodejs
        name: build_nodejs
        displayName: Nodejs 构建
        nodeVersion: 20.10.0
        commands:
          - '# 设置NPM源'
          - npm config set registry https://registry.npmmirror.com
          - ''
          - '# ★ 关键修复：进入 frontend 子目录构建 (用 npm install 替代 npm ci，因为无 lock 文件)'
          - cd frontend && npm install --legacy-peer-deps && npm run build
          - echo "✅ 前端构建完成"
        artifacts:
          - name: frontend-dist
            path:
              - ./frontend/dist/
        caches:
          - ~/.npm
        notify: []
        strategy:
          retry: '0'

  # ============================================================
  # Stage 2: 构建后端
  # ============================================================
  - name: build-backend
    displayName: 构建后端
    strategy: naturally
    trigger: auto
    executor:
      - sf110
    steps:
      - step: build@maven
        name: build_maven
        displayName: Maven 构建
        jdkVersion: '17'
        mavenVersion: 3.9.11
        commands:
          - '# ★ 关键修复：进入 backend 子目录构建'
          - cd backend && mvn clean package -Dmaven.test.skip=true -B
          - echo "✅ 后端构建完成"
        artifacts:
          - name: backend-jar
            path:
              - ./backend/target/*.jar
        caches:
          - ~/.m2
        notify: []
        strategy:
          retry: '0'

  # ============================================================
  # Stage 3: 打包 Electron Windows
  # ============================================================
  - name: package-electron
    displayName: 打包 Electron
    strategy: naturally
    trigger: auto
    steps:
      - step: build@nodejs
        name: build_electron
        displayName: Electron 打包
        nodeVersion: 20.10.0
        commands:
          - '# 设置NPM源'
          - npm config set registry https://registry.npmmirror.com
          - ''
          - '# ★ 关键：Electron 国内镜像加速（必须）'
          - export ELECTRON_MIRROR=https://npmmirror.com/mirrors/electron/
          - export ELECTRON_BUILDER_BINARIES_MIRROR=https://npmmirror.com/mirrors/electron-builder-binaries/
          - ''
          - '# ★ 彻底移除Gitee预装的全局electron-builder（从PATH中排除npm-global目录）'
          - export PATH=$(echo $PATH | sed 's|:/root/.npm-global/bin||g' | sed 's|/root/.npm-global/bin:||g')
          - ''
          - '# 确保产物目录存在'
          - mkdir -p frontend/dist backend/target release/win
          - ''
          - '# 前端构建'
          - cd frontend && npm install --legacy-peer-deps && npm run build && cd ..
          - ''
          - '# 安装兼容版electron-builder（v24.x纯CJS，无ESM冲突）到本地'
          - npm install --no-save electron-builder@24.13.0
          - ''
          - '# Electron 打包 Windows（用node直接运行本地模块，彻底绕过全局版本）'
          - node node_modules/electron-builder/cli.js --win --publish never
              --config.productName="AI漫剧"
              --config.appId="com.aicomic.platform"
              --config.directories.output="release/win"
              --config.win.target="nsis"
              --config.win.icon="assets/logo.png"
              --config.nsis.oneClick=false
              --config.nsis.allowToChangeInstallationDirectory=true
              --config.nsis.createDesktopShortcut=true
          - ''
          - echo "📦 打包完成"
          - ls -lh release/win/*.exe 2>/dev/null || echo "⚠️ exe 未生成"
        artifacts:
          - name: win-exe
            path:
              - ./release/win/*.exe
          - name: win-update
            path:
              - ./release/win/*.yml
              - ./release/win/*.blockmap
        caches:
          - ~/.npm
        notify: []
        strategy:
          retry: '1'   # Electron 下载可能失败，重试一次

  # ============================================================
  # Stage 4: 发布 Release (手动触发)
  # ============================================================
  - name: release
    displayName: 发布 Release
    strategy: naturally
    trigger: manual
    steps:
      - step: release@gitee
        name: release_gitee
        displayName: Gitee Release
        releaseName: AI漫剧 ${VERSION}
        description: |
          ## AI漫剧制作平台 v${VERSION}

          ### ✨ 功能
          - 六大模块流水线完整骨架
          - Vue3 + Element Plus 前端界面
          - Spring Boot 后端 + SQLite
          - Electron 桌面端

          ### 📥 下载安装包

          | 平台 | 文件 |
          |------|------|
          | Windows | AI漫剧-Setup-x64.exe |

          > 首次启动需要等待 JVM 初始化（约 5-10 秒）

          ---
          *由 Gitee Go 自动构建发布*
        tagName: v${VERSION}
        upstreamArtifact:
          - win-exe       # ★ 修改：引用 Electron 的产物
        assertFiles: null
        prerelease: false
        allowUpdate: true
        notify: []
        strategy:
          retry: '0'
strategy:
  blocking: true
