# ============================================================
# AI漫剧制作平台 - Gitee Go 自动化流水线
# 触发: 推送到 main 分支
# ============================================================

name: ai-comic-weaver-ci
displayName: 'AI漫剧 - 自动构建打包'

triggers:
  push:
    branches:
      include:
        - main

variables:
  VERSION: '0.1.0'
  NODE_VERSION: '20'
  JAVA_VERSION: '17'

stages:
  # ============================================================
  # Stage 1: 构建前端 (Node.js)
  # ============================================================
  - name: build-frontend
    displayName: '构建前端'
    strategy: naturally
    trigger: auto
    steps:
      - step: build@1
        name: build_frontend
        displayName: 'Vue3 + Vite 构建'
        nodeVersion: ${NODE_VERSION}
        commands:
          # 设置淘宝镜像
          - npm config set registry https://registry.npmmirror.com
          # 进入 frontend 目录安装依赖并构建
          - cd frontend && npm ci && npm run build && cd ..
          - echo "✅ 前端构建完成"
          - ls -la frontend/dist/ || echo "⚠️ dist 目录为空"
        artifacts:
          - name: frontend-dist
            path:
              - frontend/dist/

  # ============================================================
  # Stage 2: 构建后端 (Maven + JDK)
  # ============================================================
  - name: build-backend
    displayName: '构建后端'
    strategy: naturally
    trigger: auto
    steps:
      - step: build@1
        name: build_backend
        displayName: 'Spring Boot Maven 构建'
        jdkVersion: ${JAVA_VERSION}
        mavenVersion: 3.9
        commands:
          - cd backend && mvn clean package -DskipTests -q && cd ..
          - echo "✅ 后端构建完成"
          - ls -la backend/target/*.jar || echo "⚠️ JAR 文件不存在"
        artifacts:
          - name: backend-jar
            path:
              - backend/target/*.jar

  # ============================================================
  # Stage 3: Electron 打包 Windows
  # ============================================================
  - name: package-electron
    displayName: '打包 Electron'
    strategy: naturally
    trigger: auto
    steps:
      - step: build@1
        name: package_win
        displayName: '打包 Windows 安装包'
        nodeVersion: ${NODE_VERSION}
        commands:
          # 设置镜像加速（国内必须）
          - export ELECTRON_MIRROR=https://npmmirror.com/mirrors/electron/
          - export ELECTRON_BUILDER_BINARIES_MIRROR=https://npmmirror.com/mirrors/electron-builder-binaries/
          - export npm_config_registry=https://registry.npmmirror.com

          # 安装 electron-builder
          - npm install -g electron-builder@latest

          # 先确保前端和后端产物存在
          - mkdir -p frontend/dist backend/target release/win

          # 前端构建（使用根目录的 package.json 脚本）
          - cd frontend && npm ci && npm run build && cd ..

          # 检查产物
          - echo "=== 前端产物 ===" && find frontend/dist -type f | head -10 || true
          - echo "=== 后端产物 ===" && ls backend/target/*.jar 2>/dev/null || echo "无JAR"

          # Electron 打包 Windows
          - npx electron-builder --win --publish never
              --config.productName="AI漫剧"
              --config.appId="com.aicomic.platform"
              --config.directories.output="release/win"
              --config.win.target="nsis"
              --config.win.icon="assets/logo.png"
              --config.nsis.oneClick=false
              --config.nsis.allowToChangeInstallationDirectory=true
              --config.nsis.createDesktopShortcut=true

          - echo "📦 打包完成"
          - ls -lh release/win/*.exe 2>/dev/null || echo "⚠️ 未生成 exe"
          - ls -lh release/win/*.yml 2>/dev/null || true
        artifacts:
          - name: win-exe
            path:
              - release/win/*.exe
          - name: win-update
            path:
              - release/win/*.yml
              - release/win/*.blockmap

  # ============================================================
  # Stage 4: 发布 Release (手动触发)
  # ============================================================
  - name: release
    displayName: '发布 Release'
    strategy: naturally
    trigger: manual
    steps:
      - step: publish@1
        name: publish_release
        displayName: '创建版本发布'
        version: '${VERSION}'
        allowEmptyChanges: false
        artifacts:
          - name: win-installer
            path:
              - release/win/*.exe
