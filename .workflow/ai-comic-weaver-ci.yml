version: '1.0'
name: ai-comic-weaver-ci
displayName: main-pipline
triggers:
  trigger: auto
  push:
    branches:
      include:
        - main
variables:
  PROJECT_NAME: ai-comic-weaver
  VERSION: 0.1.0
  ACCESS_TOKEN: 292a18e3bdd03e83f231d5e6129fcc5
stages:
  - name: build-frontend
    displayName: 构建前端
    strategy: naturally
    trigger: auto
    executor:
      - sf110
    steps:
      - step: build@nodejs
        name: build_nodejs
        displayName: Nodejs 构建
        nodeVersion: 20.10.0
        commands:
          - '# 设置NPM源，提升安装速度'
          - npm config set registry https://registry.npmmirror.com
          - ''
          - '# 执行编译命令'
          - npm install && npm run build
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./dist
        caches:
          - ~/.npm
          - ~/.yarn
        notify: []
        strategy:
          retry: '0'
  - name: build-backend
    displayName: 构建后端
    strategy: naturally
    trigger: auto
    executor:
      - sf110
    steps:
      - step: build@maven
        name: build_maven
        displayName: Maven 构建
        jdkVersion: '17'
        mavenVersion: 3.9.11
        commands:
          - '# 功能：打包'
          - '# 参数说明：'
          - '#    -Dmaven.test.skip=true：跳过单元测试'
          - '#    -U：每次构建检查依赖更新，可避免缓存中快照版本依赖不更新问题，但会牺牲部分性能'
          - '#    -e -X ：打印调试信息，定位疑难构建问题时建议使用此参数构建'
          - '#    -B：以batch模式运行，可避免日志打印时出现ArrayIndexOutOfBoundsException异常'
          - '# 使用场景：打包项目且不需要执行单元测试时使用'
          - mvn clean package -Dmaven.test.skip=true -U -e -X -B
          - ''
          - '# 功能：自定义settings配置'
          - '# 使用场景：如需手工指定settings.xml，可使用如下方式'
          - '# 注意事项：如无需自定义settings配置且需要私有依赖仓库，可在该任务配置《私有仓库》处添加私有依赖'
          - '# mvn -U clean package -s ./settings.xml'
          - ''
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./target
        settings: []
        caches:
          - ~/.m2
        notify: []
        strategy:
          retry: '0'
  - name: package-electron
    displayName: 打包 Electron
    strategy: naturally
    trigger: auto
    steps:
      - step: build@nodejs
        name: build_nodejs
        displayName: Nodejs 构建
        nodeVersion: 20.10.0
        commands:
          - '# 设置NPM源，提升安装速度'
          - npm config set registry https://registry.npmmirror.com
          - ''
          - '# 执行编译命令'
          - npm install -g electron-builder && cd frontend && npm ci && npm run build && cd .. && npx electron-builder --win --publish never
          - ''
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./dist
        caches:
          - ~/.npm
          - ~/.yarn
        notify: []
        strategy:
          retry: '0'
  - name: release
    displayName: 发布 Release
    strategy: naturally
    trigger: manual
    steps:
      - step: release@gitee
        name: release_gitee
        displayName: Gitee Release
        releaseName: AI漫剧 ${VERSION}
        description: '## AI漫剧制作平台 v${VERSION}\n\n### 下载\n- Windows: AI漫剧-Setup-x64.exe\n\n---\n*由 Gitee Go 自动构建发布*'
        tagName: v${VERSION}
        upstreamArtifact:
          - BUILD_ARTIFACT
        assertFiles: null
        prerelease: false
        allowUpdate: true
        notify: []
        strategy:
          retry: '0'
strategy:
  blocking: true
