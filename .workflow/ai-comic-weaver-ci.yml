version: '1.0'
name: ai-comic-weaver-ci
displayName: main-pipline
triggers:
  trigger: auto
  push:
    branches:
      include:
        - main
variables:
  PROJECT_NAME: ai-comic-weaver
  VERSION: 0.1.0
stages:
  - name: build-frontend
    displayName: 构建前端
    strategy: naturally
    trigger: auto
    executor:
      - sf110
    steps:
      - step: build@nodejs
        name: build_nodejs
        displayName: Nodejs 构建
        nodeVersion: 20.10.0
        commands:
          - '# 设置NPM源'
          - npm config set registry https://registry.npmmirror.com
          - ''
          - '# ★ 关键修复：进入 frontend 子目录构建 (用 npm install 替代 npm ci，因为无 lock 文件)'
          - cd frontend && npm install --legacy-peer-deps && npm run build
          - echo "✅ 前端构建完成"
        artifacts:
          - name: frontend-dist
            path:
              - ./frontend/dist/
        caches:
          - ~/.npm
        notify: []
        strategy:
          retry: '0'
  - name: build-backend
    displayName: 构建后端
    strategy: naturally
    trigger: auto
    executor:
      - sf110
    steps:
      - step: build@maven
        name: build_maven
        displayName: Maven 构建
        jdkVersion: '17'
        mavenVersion: 3.9.11
        commands:
          - '# ★ 关键修复：进入 backend 子目录构建'
          - cd backend && mvn clean package -Dmaven.test.skip=true -B
          - echo "✅ 后端构建完成"
        artifacts:
          - name: backend-jar
            path:
              - ./backend/target/*.jar
        caches:
          - ~/.m2
        notify: []
        strategy:
          retry: '0'
  - name: package-electron
    displayName: 打包 Electron
    strategy: naturally
    trigger: auto
    steps:
      - step: build@nodejs
        name: build_electron
        displayName: Electron 打包
        nodeVersion: 20.10.0
        commands:
          - '# 设置NPM源'
          - npm config set registry https://registry.npmmirror.com
          - ''
          - '# ★ 关键：Electron 国内镜像加速'
          - export ELECTRON_MIRROR=https://npmmirror.com/mirrors/electron/
          - export ELECTRON_BUILDER_BINARIES_MIRROR=https://npmmirror.com/mirrors/electron-builder-binaries/
          - ''
          - '# ★★★ 禁掉代码签名 ★★★'
          - export CSC_IDENTITY_AUTO_DISCOVERY=false
          - ''
          - '# 安装 wine（NSIS + rcedit 需要 wine32）'
          - dpkg --add-architecture i386 && apt-get update -qq && apt-get install -y -qq wine wine32
          - ''
          - '# 安装项目依赖'
          - npm install --legacy-peer-deps
          - ''
          - '# 确保产物目录存在'
          - mkdir -p frontend/dist backend/target release/win
          - ''
          - '# 前端构建'
          - cd frontend && npm install --legacy-peer-deps && npm run build && cd ..
          - ''
          - '# Electron 打包 Windows（NSIS 安装器）'
          - npx electron-builder --win --publish never --config.productName="AI漫剧" --config.appId="com.aicomic.platform" --config.directories.output="release/win" --config.win.target="nsis" --config.win.icon="assets/logo.png" --config.nsis.oneClick=false --config.nsis.allowToChangeInstallationDirectory=true --config.nsis.createDesktopShortcut=true
          - ''
          - '# ★★★ 重命名：去掉文件名空格，Gitee Go 产物收集不支持空格 ★★★'
          - mv "release/win/AI漫剧 Setup 0.1.0.exe" release/win/AI漫剧_Setup_0.1.0.exe
          - ''
          - echo "打包完成"
          - ls -lh release/win/*.exe 2>/dev/null || echo "exe 未生成"
          - ''
        artifacts:
          - name: win_exe
            path:
              - ./release/win/*.exe
          - name: win_update
            path:
              - ./release/win/*.yml
              - ./release/win/*.blockmap
        caches:
          - ~/.npm
        notify: []
        strategy:
          retry: '0'
  - name: release
    displayName: 发布 Release
    strategy: naturally
    trigger: manual
    steps:
      - step: release@gitee
        name: release_gitee
        displayName: Gitee Release
        releaseName: AI漫剧 ${VERSION}
        description: 由 Gitee Go 自动构建发布
        tagName: v${VERSION}
        upstreamArtifact:
          - win_exe
          - win_update
        assertFiles: null
        prerelease: false
        allowUpdate: true
        notify: []
        strategy:
          retry: '0'
strategy:
  blocking: true
